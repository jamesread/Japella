syntax = "proto3";

package japella.nodemsgs.v1;

option go_package = "github.com/jamesread/japella/gen/japella/nodemsgs/v1;nodemsgsv1";

message IncomingMessage {
  string content = 1;
  string channel = 2;
  string author = 3;
  string server = 4;
  string protocol = 5;
  string message_id = 6;
  int64 timestamp = 7;
  string identity = 8; // Bot identity/username that received this message
}

message OutgoingMessage {
  string content = 1;
  string channel = 2;
  string protocol = 3;
  string incomming_message_id = 4;
  string identity = 5; // Bot identity/username to identify which bot instance should handle this message
}

message ThreadSearchRequest {
  string protocol = 1;
}

message ThreadSearchResponse {
  repeated Thread threads = 1;
}

message Thread {
  string title = 1;
}
