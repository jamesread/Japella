syntax = "proto3";

package japella.controlapi.v1;

option go_package = "github.com/jamesread/japella/gen/japella/controlapi/v1;controlv1";

message SubmitPostRequest {
	string content = 1;
	repeated uint32 social_accounts = 2;
    uint32 campaign_id = 3;
    string scheduled_at = 4; // RFC3339 or 'YYYY-MM-DDTHH:MM' local time
    repeated string media_urls = 5; // URLs to attach (e.g. /media/files/<filename>)
}

message SubmitPostResponse {
	repeated PostStatus posts = 1;
}

message PostStatus {
	uint32 id = 1;
	uint32 social_account_id = 2;
	string post_url = 3;
	bool success = 4;
	string created = 5;
	string social_account_icon = 6;
	string social_account_identity = 7;
	string content = 8;
    uint32 campaign_id = 9;
    string campaign_name = 10;
    string state = 11;
    string posted_date = 12; // The date the post was/will be posted (scheduled_at if set, otherwise created_at)
}

message GetStatusRequest {}

message GetStatusResponse {
	string status = 1;
	repeated string nanoservices = 2;
	string version = 3;
	string username = 5;
	bool is_logged_in = 6;
	repeated StatusMessage status_messages = 7;
    bool uses_secure_cookies = 8;
    string database_host = 9;
    string database_name = 10;
    string listen_address = 11;
    uint32 database_schema_version = 12;
    bool database_schema_dirty = 13;
}

message StatusMessage {
	string message = 1;
	string type = 2;
}

message GetCannedPostsRequest {
}

message GetCannedPostsResponse {
	repeated CannedPost posts = 1;
}

message CannedPost {
	uint32 id = 1;
	string content = 2;
	string created_at = 3;
}

message CreateCannedPostRequest {
	string content = 1;
}

message CreateCannedPostResponse {
	string message = 1;
}

message DeleteCannedPostRequest {
	uint32 id = 1;
}

message DeleteCannedPostResponse {
	string message = 1;
}

message UpdateCannedPostRequest {
  uint32 id = 1;
  string content = 2;
}

message UpdateCannedPostResponse {
  StandardResponse standard_response = 1;
}

message GetCannedPostRequest {
  uint32 id = 1;
}

message GetCannedPostResponse {
  CannedPost post = 1;
}

message GetSocialAccountsRequest {
	bool only_active = 1;
}

message GetSocialAccountsResponse {
	repeated SocialAccount accounts = 1;
}

message SocialAccount {
	uint32 id = 1;
	string identity = 2;
	bool has_wall = 3;
	bool has_channels = 4;
	string connector = 5;
	string icon = 6;
	bool active = 7;
	string token_expiry = 8; // RFC3339 timestamp, empty if token doesn't expire
}

message GetConnectorsRequest {
	bool only_want_oauth = 1;
}

message GetConnectorsResponse {
	repeated Connector connectors = 1;
	repeated UnregisteredConnector unregistered_connectors = 2; // Connectors that exist but aren't started
}

message Connector {
	string name = 2;
	string protocol = 9; // The connector protocol (e.g., "telegram", "discord")
	string icon = 3;
	bool has_oauth = 4;
    repeated string issues = 5;
    bool is_registered = 6;
	bool is_started = 7; // Whether the connector is currently started
	bool uses_yaml_config = 8; // Whether the connector uses YAML configuration (as opposed to OAuth)
	bool supports_social_accounts = 10; // Whether the connector supports social accounts
	bool supports_chatbot = 11; // Whether the connector supports chatbot functionality
}

message UnregisteredConnector {
	string protocol = 1; // The connector protocol (e.g., "telegram", "discord")
	string name = 2; // Display name
	string icon = 3; // Icon identifier
}

message StartOAuthRequest {
	string connector_id = 1;
}

message StartOAuthResponse {
	string url = 1;
}

message DeleteSocialAccountRequest {
	uint32 id = 1;
}

message DeleteSocialAccountResponse {
	StandardResponse standard_response = 1;
}

message RefreshSocialAccountRequest {
	uint32 id = 1;
}

message RefreshSocialAccountResponse {
	StandardResponse standard_response = 1;
}

message StandardResponse {
	bool success = 1;
	string message = 2;
	string redirect_url = 3;
}

message GetTimelineRequest {
	// Optional page number for paginated timeline requests (1-based).
	uint32 page = 1;

	// Optional page size for paginated timeline requests.
	uint32 page_size = 2;
}

message GetTimelineResponse {
	// The posts for the requested page (or all posts if no pagination specified).
	repeated PostStatus posts = 1;

	// Total number of posts available across all pages.
	uint32 total = 2;
}

message UpdatePostCampaignRequest {
	uint32 post_id = 1;
	uint32 campaign_id = 2;
}

message UpdatePostCampaignResponse {
	StandardResponse standard_response = 1;
}

message ForgetPostRequest {
	uint32 post_id = 1;
}

message ForgetPostResponse {
	StandardResponse standard_response = 1;
}

message RetryPostRequest {
	uint32 post_id = 1;
}

message RetryPostResponse {
	StandardResponse standard_response = 1;
	PostStatus post_status = 2;
}

message GetFeedRequest {
}

message GetFeedResponse {
	repeated FeedPost posts = 1;
}

message FeedPost {
	uint32 id = 1;
	uint32 social_account_id = 2;
	string social_account_icon = 3;
	string social_account_identity = 4;
	string content = 5;
	string posted_date = 6;
	uint32 author_id = 7;
	string author_name = 8;
	string remote_url = 9;
	string remote_id = 10;
	string preview_url = 11;
	string preview_title = 12;
	string preview_description = 13;
	string preview_image_url = 14;
}

message SetSocialAccountActiveRequest {
	uint32 id = 1;
	bool active = 2;
}

message SetSocialAccountActiveResponse {
	StandardResponse standard_response = 1;
}

message CleanupFeedPostsRequest {
}

message CleanupFeedPostsResponse {
	StandardResponse standard_response = 1;
}

message LoginWithUsernameAndPasswordRequest {
	string username = 1;
	string password = 2;
}

message LoginWithUsernameAndPasswordResponse {
	StandardResponse standard_response = 1;
	string username = 2;
	string token = 3;
}

message ChangePasswordRequest {
	string current_password = 1;
	string new_password = 2;
}

message ChangePasswordResponse {
	StandardResponse standard_response = 1;
}

message LogoutRequest {
}

message LogoutResponse {
	StandardResponse standard_response = 1;
}

message GetUsersRequest {
}

message GetUsersResponse {
	repeated UserAccount users = 1;
}

message UserAccount {
	uint32 id = 1;
	string username = 2;
	string created_at = 3;
}

message GetApiKeysRequest {
}

message GetApiKeysResponse {
	repeated ApiKey keys = 1;
}

message ApiKey {
	uint32 id = 1;
	string key_value = 2;
	string created_at = 3;
	uint32 user_id = 4;
	string username = 5;
}

message GetCvarsRequest {
}

message GetCvarsResponse {
	map<string, CvarCategory> cvar_categories = 1;
}

message CvarCategory {
	repeated Cvar cvars = 1;
	string name = 2;
}

message Cvar {
	string key_name = 1;
	string value_string = 2;
	int32 value_int = 3;
	string description = 4;
	bool is_read_only = 5;
	uint32 max_length = 6;
	string type = 7;
	string title = 8;
    string docs_url = 9;
    string external_url = 10;
}

message SaveUserPreferencesRequest {
	string language = 1;
}

message SaveUserPreferencesResponse {
	StandardResponse standard_response = 1;
	string username = 2;
}

message CreateApiKeyRequest {
}

message CreateApiKeyResponse {
	StandardResponse standard_response = 1;
	string new_key_value = 2;
}

message RevokeApiKeyRequest {
	uint32 id = 1;
}

message RevokeApiKeyResponse {
	StandardResponse standard_response = 1;
}

message SetCvarRequest {
	string key_name = 1;
	string value_string = 2;
	int32 value_int = 3;
}

message SetCvarResponse {
	StandardResponse standard_response = 1;
	string key_name = 2;
	string value_string = 3;
	int32 value_int = 4;
}

message RegisterConnectorRequest {
  string name = 1;
}

message RegisterConnectorResponse {
  StandardResponse standard_response = 1;
}

message CreateCampaignRequest {
  string name = 1;
  string description = 2;
}

message CreateCampaignResponse {
  StandardResponse standard_response = 1;
  uint32 campaign_id = 2;
}

message GetCampaignsRequest {
}

message GetCampaignsResponse {
  repeated Campaign campaigns = 1;
}

message Campaign {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  string created_at = 4;
  int32 post_count = 5;
  string last_post_date = 6;
  int32 account_count = 7;
}

message AddSocialAccountToCampaignRequest {
  uint32 campaign_id = 1;
  uint32 social_account_id = 2;
}

message AddSocialAccountToCampaignResponse {
  StandardResponse standard_response = 1;
}

message RemoveSocialAccountFromCampaignRequest {
  uint32 campaign_id = 1;
  uint32 social_account_id = 2;
}

message RemoveSocialAccountFromCampaignResponse {
  StandardResponse standard_response = 1;
}

message GetCampaignSocialAccountsRequest {
  uint32 campaign_id = 1;
}

message GetCampaignSocialAccountsResponse {
  repeated uint32 social_account_ids = 1;
}

message UpdateCampaignRequest {
  uint32 id = 1;
  string name = 2;
  string description = 3;
}

message UpdateCampaignResponse {
  StandardResponse standard_response = 1;
}

message DeleteCampaignRequest {
  uint32 id = 1;
}

message DeleteCampaignResponse {
  StandardResponse standard_response = 1;
}

message GetLogsRequest {
	uint32 limit = 1; // Maximum number of logs to return, default 100
}

message GetLogsResponse {
	repeated LogEntry logs = 1;
}

message LogEntry {
	uint32 id = 1;
	string message = 2;
	string level = 3;
	uint32 related_social_account_id = 4; // 0 if not set
	string related_social_account_identity = 5; // Empty if not set
	string created_at = 6; // RFC3339 timestamp
}

message GetJobsStatusRequest {
}

message GetJobsStatusResponse {
	repeated JobStatus jobs = 1;
}

message JobStatus {
	string name = 1;
	string display_name = 2;
	string last_run = 3; // RFC3339 timestamp, empty if never run
	string schedule = 4; // Human-readable schedule description
}

message ListMediaRequest {
}

message ListMediaResponse {
	repeated MediaItem items = 1;
}

message MediaItem {
	string filename = 1;
	string url = 2; // URL path to fetch the file (e.g. /media/files/<filename>)
}

message GetChatBotsRequest {
}

message GetChatBotsResponse {
	repeated ChatBot bots = 1;
}

message ChatBot {
	string connector = 1; // The connector protocol (e.g., "telegram", "discord")
	string name = 2; // Display name of the bot
	string identity = 3; // Bot identity/username
	string icon = 4; // Icon identifier
	bool is_running = 5; // Whether the bot is currently running
	string status_message = 6; // Diagnostic message explaining why the bot is stopped or its current status
	string error_message = 7; // Error message if the bot failed to start
	string protocol_display_name = 8; // Protocol-specific display name (e.g., Telegram bot's FirstName)
}

message GetBotChannelsRequest {
	string connector = 1; // The connector protocol (e.g., "telegram", "discord")
	string identity = 2; // Bot identity/username (optional, for distinguishing multiple bots of same type)
}

message GetBotChannelsResponse {
	repeated BotChannel channels = 1;
}

message BotChannel {
	string id = 1; // Channel/chat ID
	string title = 2; // Channel/chat title
	string type = 3; // Channel type (e.g., "channel", "group", "private")
	string username = 4; // Username if available
}

message IncomingMessageHook {
	string url = 1; // Webhook URL to call
	bool enabled = 2; // Whether this hook is enabled
}

message GetBotHooksRequest {
	string connector = 1; // The connector protocol (e.g., "telegram", "discord")
	string identity = 2; // Bot identity/username
}

message GetBotHooksResponse {
	repeated IncomingMessageHook hooks = 1;
}

message SetBotHooksRequest {
	string connector = 1; // The connector protocol (e.g., "telegram", "discord")
	string identity = 2; // Bot identity/username
	repeated IncomingMessageHook hooks = 3; // List of hooks to configure
}

message SetBotHooksResponse {
	StandardResponse standard_response = 1;
}

service JapellaControlApiService {
	rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {}

	rpc SubmitPost(SubmitPostRequest) returns (SubmitPostResponse) {}

	rpc GetCannedPosts(GetCannedPostsRequest) returns (GetCannedPostsResponse) {}

	rpc GetCannedPost(GetCannedPostRequest) returns (GetCannedPostResponse) {}

	rpc CreateCannedPost(CreateCannedPostRequest) returns (CreateCannedPostResponse) {}

	rpc DeleteCannedPost(DeleteCannedPostRequest) returns (DeleteCannedPostResponse) {}

	rpc GetSocialAccounts(GetSocialAccountsRequest) returns (GetSocialAccountsResponse) {}

	rpc DeleteSocialAccount(DeleteSocialAccountRequest) returns (DeleteSocialAccountResponse) {}

	rpc RefreshSocialAccount(RefreshSocialAccountRequest) returns (RefreshSocialAccountResponse) {}

	rpc GetConnectors(GetConnectorsRequest) returns (GetConnectorsResponse) {}

	rpc StartOAuth(StartOAuthRequest) returns (StartOAuthResponse) {}

	rpc GetTimeline(GetTimelineRequest) returns (GetTimelineResponse) {}

	rpc GetFeed(GetFeedRequest) returns (GetFeedResponse) {}

	rpc UpdatePostCampaign(UpdatePostCampaignRequest) returns (UpdatePostCampaignResponse) {}

	rpc ForgetPost(ForgetPostRequest) returns (ForgetPostResponse) {}

	rpc RetryPost(RetryPostRequest) returns (RetryPostResponse) {}

	rpc SetSocialAccountActive(SetSocialAccountActiveRequest) returns (SetSocialAccountActiveResponse) {}

	rpc LoginWithUsernameAndPassword(LoginWithUsernameAndPasswordRequest) returns (LoginWithUsernameAndPasswordResponse) {}

	rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {}

	rpc Logout(LogoutRequest) returns (LogoutResponse) {}

	rpc GetUsers(GetUsersRequest) returns (GetUsersResponse) {}

	rpc GetApiKeys(GetApiKeysRequest) returns (GetApiKeysResponse) {}

	rpc GetCvars(GetCvarsRequest) returns (GetCvarsResponse) {}

	rpc SaveUserPreferences(SaveUserPreferencesRequest) returns (SaveUserPreferencesResponse) {}

	rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse) {}

	rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse) {}

	rpc SetCvar(SetCvarRequest) returns (SetCvarResponse) {}

    rpc RegisterConnector(RegisterConnectorRequest) returns (RegisterConnectorResponse) {}

    rpc CreateCampaign(CreateCampaignRequest) returns (CreateCampaignResponse) {}

    rpc GetCampaigns(GetCampaignsRequest) returns (GetCampaignsResponse) {}

    rpc UpdateCampaign(UpdateCampaignRequest) returns (UpdateCampaignResponse) {}

    rpc DeleteCampaign(DeleteCampaignRequest) returns (DeleteCampaignResponse) {}

    rpc UpdateCannedPost(UpdateCannedPostRequest) returns (UpdateCannedPostResponse) {}

    rpc AddSocialAccountToCampaign(AddSocialAccountToCampaignRequest) returns (AddSocialAccountToCampaignResponse) {}
    rpc RemoveSocialAccountFromCampaign(RemoveSocialAccountFromCampaignRequest) returns (RemoveSocialAccountFromCampaignResponse) {}
    rpc GetCampaignSocialAccounts(GetCampaignSocialAccountsRequest) returns (GetCampaignSocialAccountsResponse) {}

    rpc CleanupFeedPosts(CleanupFeedPostsRequest) returns (CleanupFeedPostsResponse) {}

    rpc GetLogs(GetLogsRequest) returns (GetLogsResponse) {}

    rpc GetJobsStatus(GetJobsStatusRequest) returns (GetJobsStatusResponse) {}

    rpc ListMedia(ListMediaRequest) returns (ListMediaResponse) {}
    rpc GetChatBots(GetChatBotsRequest) returns (GetChatBotsResponse) {}
    rpc GetBotChannels(GetBotChannelsRequest) returns (GetBotChannelsResponse) {}
    rpc GetBotHooks(GetBotHooksRequest) returns (GetBotHooksResponse) {}
    rpc SetBotHooks(SetBotHooksRequest) returns (SetBotHooksResponse) {}
}
